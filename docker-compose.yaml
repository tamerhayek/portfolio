services:
  portfolio:
    container_name: portfolio
    image: ghcr.io/tamerhayek/portfolio:latest
    restart: unless-stopped
    ports:
      - '3000:3000'
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://127.0.0.1:3000 || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
